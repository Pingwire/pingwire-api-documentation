allOf:
- $ref: '#/components/schemas/CarBody'
- type: object
  properties:
    status:
      type: string
      description: Status of the car in the Pingwire system. Blocked entities will always receive recommendation "Block" on all their requests.
      enum:
      - Available
      - Blocked
    groups:
      description: List of groups the entity should be associated to
      type: array
      items:
        type: string
        format: ObjectId
    addGroups:
      description: List of group IDs to add to the entity.
      type: array
      items:
        type: string
        format: ObjectId
    removeGroups:
      description: List of group IDs to remove from the entity.
      type: array
      items:
        type: string
        format: ObjectId

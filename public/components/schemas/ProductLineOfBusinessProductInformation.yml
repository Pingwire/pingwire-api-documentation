type: object
properties:
  productInformation:
    type: object
    description: Information about the product
    properties:
      name:
        type: string
        description: Name of the line of business
      type:
        type: string
        description: Type of the line of business
        enum:
        - physical
        - digital
        - hybrid
      address:
        type: object
        description: Address associated to the line of business
        properties:
          streetAddress:
            type: string
            description: Street part of the address. Typically street name and house number
          postalCode:
            type: string
            description: Postal code
          city:
            type: string
            description: City
          country:
            type: string
            format: ISO 3166 ALPHA-3
            description: Country
            examples:
            - SWE
      email:
        type: string
        format: email
        description: Contact email associated to the line of business
        examples:
        - test@test.com
      phone:
        type: string
        description: Phone number associated to the line of business
        examples:
        - "0701234567"

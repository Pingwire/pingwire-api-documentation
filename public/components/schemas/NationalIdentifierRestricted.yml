type: object
required:
- country
- identifier
properties:
  country:
    type: string
    format: ISO 3166 ALPHA-3
    examples:
    - SWE
    description: Country of the national identifier
  identifier:
    type: string
    description: Identification number. The format depends of the country chosen.
  type:
    type: string
    enum: 
    - socialSecurityNumber
    - passportNumber
    description: Type of the national identifier. The format depends of the country chosen. Optional, default to socialSecurityNumber if country is SWE, FIN, DKK, GBR, ZAF and passportNumber for other country.
